function log(msg,cls){const d=document.createElement('div');d.className='stap '+(cls||'');d.innerHTML=msg;document.getElementById('log').appendChild(d);window.scrollTo(0,document.body.scrollHeight)}
function b64u(s){return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'')}
function b64ub(b){return btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'')}
async function getToken(){
  const now=Math.floor(Date.now()/1000);
  const h=b64u(JSON.stringify({alg:'RS256',typ:'JWT'}));
  const cl=b64u(JSON.stringify({iss:SAMAIL,scope:'https://www.googleapis.com/auth/spreadsheets',aud:'https://oauth2.googleapis.com/token',iat:now,exp:now+3600}));
  const msg=h+'.'+cl;
  const pem=SAKEY.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----/g,'').replace(/\n/g,'');
  const der=Uint8Array.from(atob(pem),c=>c.charCodeAt(0));
  const k=await crypto.subtle.importKey('pkcs8',der,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',k,new TextEncoder().encode(msg));
  const jwt=msg+'.'+b64ub(sig);
  const r=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion='+jwt});
  const d=await r.json();
  if(!d.access_token)throw new Error(d.error_description||d.error);
  return d.access_token;
}
async function shClear(t,r){await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${encodeURIComponent(r)}:clear`,{method:'POST',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'},body:'{}'})}
async function shPut(t,r,v){return(await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${encodeURIComponent(r)}?valueInputOption=RAW`,{method:'PUT',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify({values:v})})).json()}
async function upload(t,sheet,rows,cols,bs=200){
  await shPut(t,sheet+'!A1',[rows[0]]);
  for(let i=1;i<rows.length;i+=bs){
    const b=rows.slice(i,i+bs);
    await shPut(t,`${sheet}!A${i+1}:${cols}${i+b.length}`,b);
    log(`  ${sheet}: ${Math.min(i+bs,rows.length)}/${rows.length}...`,'warn');
  }
}
