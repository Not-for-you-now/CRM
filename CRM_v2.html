<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NET/WORK CRM</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0d; --bg1:#141414; --bg2:#1c1c1c; --bg3:#232323;
  --b:#2a2a2a;  --b2:#363636;
  --t:#e8e8e8;  --t2:#888888; --t3:#444444;
  --acc:#00d4aa; --acc2:#00a882;
  --red:#ff4d4d; --ora:#ff8c00; --yel:#ffd700; --blu:#4d9fff;
  --fa:#00d4aa; --fb:#4d9fff; --fc:#ffd700; --fd:#444444;
  --f0:#444444; --f1:#4d9fff; --f2:#ff8c00; --f3:#00d4aa; --f4:#2a2a2a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--t);font-size:12px;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ── TOPBAR ── */
#tb{height:46px;background:var(--bg1);border-bottom:1px solid var(--b);display:flex;align-items:center;padding:0 14px;gap:0;flex-shrink:0;user-select:none;overflow-x:auto}
#logo{font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:13px;letter-spacing:5px;color:var(--acc);margin-right:16px;white-space:nowrap}
.tab{height:46px;padding:0 12px;display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--t3);font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--t);border-bottom-color:var(--acc)}
.badge{background:var(--bg3);color:var(--t3);font-size:9px;padding:1px 5px;border-radius:2px;min-width:18px;text-align:center}
.tab.on .badge{background:var(--acc);color:var(--bg)}
#tbr{margin-left:auto;display:flex;align-items:center;gap:12px;flex-shrink:0}
#sync{font-size:10px;color:var(--t3)}
#sync.ok{color:var(--acc)}#sync.err{color:var(--red)}#sync.busy{color:var(--yel)}
#tbdate{font-size:10px;color:var(--t3);white-space:nowrap}

/* ── LAYOUT ── */
#body{display:flex;flex:1;overflow:hidden}

/* ── LEFT PANEL ── */
#lp{width:300px;min-width:300px;border-right:1px solid var(--b);display:flex;flex-direction:column;background:var(--bg1);overflow:hidden}
#fb{padding:9px;border-bottom:1px solid var(--b);display:flex;flex-direction:column;gap:6px;flex-shrink:0}
#sw{position:relative}
#sq{width:100%;background:var(--bg2);border:1px solid var(--b2);color:var(--t);padding:6px 28px 6px 9px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:11px;outline:none;transition:border-color .15s}
#sq:focus{border-color:var(--acc)}
#sqx{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--t3);cursor:pointer;font-size:15px;display:none}
.pills{display:flex;gap:3px;flex-wrap:wrap}
.pill{padding:3px 7px;border-radius:2px;border:1px solid var(--b2);cursor:pointer;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;transition:all .1s;white-space:nowrap}
.pill:hover{color:var(--t2)}
.pill.on{color:var(--bg)}
.fr{display:flex;gap:5px;align-items:center}
select{background:var(--bg2);border:1px solid var(--b2);color:var(--t2);padding:5px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:10px;outline:none;color-scheme:dark;cursor:pointer}
select:focus{border-color:var(--acc)}
#rc{font-size:9px;color:var(--t3);white-space:nowrap}
.ib{background:none;border:none;cursor:pointer;color:var(--t3);font-size:13px;padding:2px 4px;transition:color .1s}
.ib:hover{color:var(--acc)}

/* ── BEDRIJFSRIJ ── */
#cl{overflow-y:auto;flex:1}
.brow{padding:9px 10px;cursor:pointer;border-bottom:1px solid var(--b);border-left:3px solid transparent;transition:background .08s;display:flex;align-items:center;gap:9px}
.brow:hover{background:var(--bg2)}
.brow.on{background:var(--bg2);border-left-color:var(--acc)}
.bav{width:30px;height:30px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--bg);letter-spacing:.3px}
.bi{flex:1;min-width:0}
.bn{font-size:11px;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.bp{font-size:10px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.bmeta{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.abcd-badge{width:18px;height:18px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--bg)}
.lc-lbl{font-size:9px}
.lm{padding:20px;text-align:center;color:var(--t3);font-size:11px;letter-spacing:2px}
#ncb2{padding:8px 10px;border-top:1px solid var(--b);display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--t3);font-size:11px;transition:color .12s;background:none;border-left:none;border-right:none;border-bottom:none;width:100%;font-family:'IBM Plex Mono',monospace}
#ncb2:hover{color:var(--acc)}

/* ── MIDDLE: DETAIL ── */
#dp{flex:1;overflow-y:auto;background:var(--bg);border-right:1px solid var(--b);min-width:0}
#de{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);gap:8px}
#de .big{font-size:36px}
#de .lbl{font-size:10px;letter-spacing:3px;text-transform:uppercase}
#dc{padding:20px;display:none}

/* ── DETAIL COMPONENTEN ── */
.dh{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px}
.dav{width:46px;height:46px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--bg)}
.dt{font-family:'IBM Plex Sans',sans-serif;font-size:17px;font-weight:600;color:var(--t);margin-bottom:3px}
.ds{font-size:11px;color:var(--t2);margin-bottom:6px}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{padding:2px 7px;border-radius:2px;font-size:9px;letter-spacing:.5px;text-transform:uppercase;border:1px solid}
.sec{background:var(--bg1);border:1px solid var(--b);border-radius:3px;padding:11px 13px;margin-bottom:10px}
.sl{font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.inp{width:100%;background:var(--bg2);border:1px solid var(--b2);color:var(--t);padding:5px 8px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:11px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--acc)}
.btn{background:var(--acc);color:var(--bg);border:none;padding:6px 14px;border-radius:3px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:1px;transition:background .12s}
.btn:hover{background:var(--acc2)}
.btn:disabled{background:var(--bg3);color:var(--t3);cursor:not-allowed}
.bg{background:none;border:1px solid var(--b2);color:var(--t3);padding:5px 10px;border-radius:3px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px}
.bg:hover{border-color:var(--t2);color:var(--t2)}
.ss{font-size:10px;color:var(--t3);margin-left:8px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ig label{display:block;font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}

/* ── ABCD KIEZER ── */
.abcd-kiezer{display:flex;gap:6px}
.abcd-btn{width:32px;height:32px;border-radius:3px;border:2px solid transparent;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;transition:all .12s;display:flex;align-items:center;justify-content:center}
.abcd-btn.on{color:var(--bg)}

/* ── FASE KNOPPEN ── */
.fg{display:flex;gap:5px;flex-wrap:wrap}
.fb{padding:5px 9px;border-radius:2px;border:1px solid transparent;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;transition:all .12s}

/* ── PERSONEN IN BEDRIJF ── */
.ptabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px}
.ptab{padding:4px 10px;border-radius:2px;border:1px solid var(--b2);cursor:pointer;font-size:10px;color:var(--t3);transition:all .12s;white-space:nowrap}
.ptab:hover{color:var(--t2);border-color:var(--t2)}
.ptab.on{border-color:var(--acc);color:var(--acc);background:rgba(0,212,170,.07)}
.pkaart{background:var(--bg2);border:1px solid var(--b);border-radius:3px;padding:10px 12px;margin-bottom:8px}
.pnaam{font-size:12px;color:var(--t);font-weight:500;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.pinfo{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.pinfo a{color:var(--acc);font-size:10px;text-decoration:none}
.pinfo a:hover{text-decoration:underline}
.pinfo span{font-size:10px;color:var(--t2)}

/* ── SNELKNOPPEN PERSOON ── */
.pbtns{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.qb{padding:3px 8px;background:none;border:1px solid var(--b2);color:var(--t3);border-radius:2px;cursor:pointer;font-size:10px;font-family:'IBM Plex Mono',monospace;transition:all .1s}
.qb:hover{border-color:var(--acc);color:var(--acc)}

/* ── TIJDLIJN ── */
.tr{display:flex;gap:10px;margin-bottom:6px}
.td{width:72px;flex-shrink:0;padding-top:2px}
.tdate{font-size:9px;color:var(--t3)}
.ttime{font-size:9px;color:var(--acc)}
.tc{flex:1;background:var(--bg3);border:1px solid var(--b);border-radius:3px;padding:6px 8px}
.tnote{font-size:11px;color:var(--t);line-height:1.5}
.trem{font-size:10px;color:var(--yel);margin-top:3px}

/* ── ACTIES ── */
.ar{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--b)}
.ar:last-child{border-bottom:none}
.chk{width:14px;height:14px;border:1.5px solid var(--b2);border-radius:2px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .12s;font-size:8px}
.chk.on{background:var(--acc);border-color:var(--acc);color:var(--bg)}
.at{flex:1;font-size:11px;color:var(--t);line-height:1.4}
.at.x{text-decoration:line-through;color:var(--t3)}
.dl{font-size:9px;padding:1px 5px;border-radius:2px;border:1px solid}
.dl.oud{color:var(--red);border-color:rgba(255,77,77,.3);background:rgba(255,77,77,.07)}
.dl.vd{color:var(--yel);border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.07)}
.dl.ok{color:var(--acc);border-color:rgba(0,212,170,.3);background:rgba(0,212,170,.07)}
.nar{display:flex;gap:6px;align-items:center;margin-top:10px;flex-wrap:wrap}

/* ── EXTRA VIEWS ── */
#av{flex:1;overflow-y:auto;padding:20px;background:var(--bg);display:none;min-width:0}
#kv{flex:1;overflow-y:auto;padding:20px;background:var(--bg);display:none;min-width:0}
.vt{font-family:'IBM Plex Sans',sans-serif;font-size:18px;font-weight:600;color:var(--t);margin-bottom:3px}
.vs{font-size:11px;color:var(--t2);margin-bottom:14px}
.pts{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.pt{padding:4px 10px;border-radius:2px;border:1px solid var(--b2);background:none;color:var(--t3);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;transition:all .12s}
.pt:hover{color:var(--t2);border-color:var(--t2)}
.pt.on{border-color:var(--acc);color:var(--acc)}
.ac{background:var(--bg1);border:1px solid var(--b);border-radius:3px;padding:8px 11px;margin-bottom:5px;display:flex;align-items:flex-start;gap:8px}
.ac.x{opacity:.4}
.cl{font-size:10px;color:var(--acc);cursor:pointer}
.cl:hover{text-decoration:underline}
.arc{background:var(--bg1);border:1px solid var(--b);border-radius:3px;padding:8px 11px;margin-bottom:4px;display:flex;align-items:center;gap:9px}

/* ── RIGHT: DASHBOARD ── */
#rp{width:260px;min-width:260px;background:var(--bg1);border-left:1px solid var(--b);overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.dc{background:var(--bg2);border:1px solid var(--b);border-radius:3px;padding:10px 11px}
.dtl{font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.st{background:var(--bg3);border:1px solid var(--b2);border-radius:2px;padding:8px;cursor:pointer;transition:border-color .12s}
.st:hover{border-color:var(--t3)}
.sn{font-family:'IBM Plex Sans',sans-serif;font-size:20px;font-weight:600;line-height:1}
.sl2{font-size:8px;color:var(--t3);margin-top:3px;letter-spacing:1px;text-transform:uppercase}
.pb{display:flex;height:4px;border-radius:2px;overflow:hidden;gap:1px;margin-bottom:8px}
.ps{height:100%}
.di{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--b);cursor:pointer}
.di:last-child{border-bottom:none}
.di:hover{opacity:.8}
.dtijd{font-size:10px;color:var(--acc);width:36px;flex-shrink:0}
.dnam{font-size:11px;color:var(--t);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dsub{font-size:9px;color:var(--t2)}
.em{font-size:10px;color:var(--t3);font-style:italic}
.fbr{display:flex;align-items:center;gap:6px;margin-bottom:5px;cursor:pointer}
.fbr:hover .fbl{color:var(--t2)}
.fbl{font-size:9px;color:var(--t2);width:72px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fbt{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.fbf{height:100%;border-radius:2px}
.fbn{font-size:9px;color:var(--t3);width:18px;text-align:right}

/* ── MODAL ── */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
#ov.open{display:flex}
#mo{background:var(--bg1);border:1px solid var(--b2);border-radius:4px;padding:20px;width:420px;max-width:92vw;max-height:85vh;overflow-y:auto}
#mo h2{font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:600;color:var(--t);margin-bottom:14px}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.mrow{display:flex;gap:8px;margin-bottom:9px}
.mrow>*{flex:1}
.mlbl{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}

/* ── TOAST ── */
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--b2);color:var(--t);padding:8px 16px;border-radius:3px;font-size:11px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

/* ── MOBIEL ── */
@media(max-width:700px){
  #tb{padding:0 8px}
  #logo{font-size:10px;letter-spacing:2px;margin-right:8px}
  .tab{padding:0 8px;font-size:9px}
  #tbdate{display:none}
  #body{flex-direction:column;overflow-y:auto;overflow-x:hidden}
  #lp{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--b);max-height:50vh}
  #dp{width:100%;min-width:0;border-right:none;flex:none}
  #dc{padding:12px}
  #rp{display:none!important}
  body.detail-open #lp{display:none}
  body.detail-open #dp{display:block}
  #back-btn{display:flex!important}
  .ig{grid-template-columns:1fr}
  .pbtns{flex-wrap:wrap}
  #av,#kv{padding:12px}
}
</style>
</head>

const ds   = d=>{if(!d)return null;try{return Math.floor((Date.now()-new Date(d))/864e5)}catch{return null}};
const lcL  = d=>{const n=ds(d);return n===null?'—':n===0?'vandaag':n===1?'gisteren':n+'d'};
const lcC  = d=>{const n=ds(d);return n===null?'var(--t3)':n<3?'var(--acc)':n<14?'var(--t2)':n<42?'var(--yel)':'var(--red)'};

// ── AUTH ─────────────────────────────────────────────────────────────────
function b64u(s){return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'')}
function b64ub(b){return btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'')}

async function getToken(){
  if(tok&&Date.now()<tokExp-60000)return tok;
  const now=Math.floor(Date.now()/1000);
  const h=b64u(JSON.stringify({alg:'RS256',typ:'JWT'}));
  const cl=b64u(JSON.stringify({iss:SAMAIL,scope:'https://www.googleapis.com/auth/spreadsheets',aud:'https://oauth2.googleapis.com/token',iat:now,exp:now+3600}));
  const msg=h+'.'+cl;
  const pem=SAKEY.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
  const der=Uint8Array.from(atob(pem),c=>c.charCodeAt(0));
  const k=await crypto.subtle.importKey('pkcs8',der,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',k,new TextEncoder().encode(msg));
  const jwt=msg+'.'+b64ub(sig);
  const r=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion='+jwt});
  const d=await r.json();
  if(!d.access_token)throw new Error(d.error_description||d.error||'Token fout');
  tok=d.access_token;tokExp=Date.now()+(d.expires_in||3600)*1000;
  return tok;
}
async function shGet(r){const t=await getToken();return(await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${encodeURIComponent(r)}`,{headers:{Authorization:'Bearer '+t}})).json()}
async function shApp(r,v){const t=await getToken();return(await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${encodeURIComponent(r)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{method:'POST',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify({values:v})})).json()}
async function shPut(r,v){const t=await getToken();return(await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${encodeURIComponent(r)}?valueInputOption=RAW`,{method:'PUT',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify({values:v})})).json()}

// ── RENDER LIJST ──────────────────────────────────────────────────────────
function getFiltered(){
  const q=document.getElementById('sq').value.toLowerCase().trim();
  const so=document.getElementById('fso').value;
  const lc=document.getElementById('flc').value;
  const sr=document.getElementById('fsr').value;
  let L=COMPANIES.filter(c=>{
    if(fABCD!=='Alle'&&c.abcd!==fABCD)return false;
    if(fFase!=='Alle'&&c.status!==fFase)return false;
    if(so&&c.soort!==so)return false;
    if(q){
      const hay=c.naam+' '+c.soort+' '+c.personen.map(p=>p.naam+' '+p.email).join(' ');
      if(!hay.toLowerCase().includes(q))return false;
    }
    if(lc){
      const d=ds(c.laatste_contact);
      if(lc==='nooit')return d===null;
      const n=parseInt(lc);
      if(n>=0)return d!==null&&d<=n;
      if(n<0)return d===null||d>Math.abs(n);
    }
    return true;
  });
  const abcdRank={'A':0,'B':1,'C':2,'D':3};
  if(sr==='lc-oud') L.sort((a,b)=>(a.laatste_contact||'9999').localeCompare(b.laatste_contact||'9999'));
  else if(sr==='lc-nieuw')L.sort((a,b)=>(b.laatste_contact||'').localeCompare(a.laatste_contact||''));
  else if(sr==='abcd')L.sort((a,b)=>abcdRank[a.abcd]-abcdRank[b.abcd]||(a.naam||'').localeCompare(b.naam||''));
  else if(sr==='naam')L.sort((a,b)=>(a.naam||'').localeCompare(b.naam||''));
  else if(sr==='ix')L.sort((a,b)=>b.totaal_ix-a.totaal_ix);
  return L;
}

function rl(){
  const L=getFiltered();
  document.getElementById('rc').textContent=L.length;
  if(!L.length){document.getElementById('cl').innerHTML='<div class="lm">GEEN RESULTATEN</div>';return}
  document.getElementById('cl').innerHTML=L.map(browH).join('');
}

// ── ACTIES ────────────────────────────────────────────────────────────────
async function qNiet(bid,pid){
  const c=getC(bid),p=getP(c,pid);if(!c||!p)return;
  const pog=p.interacties.filter(i=>/poging|niet bereikt/i.test(i.note||'')).length+1;
  const note=`Poging ${pog}/5 — niet bereikt`;
  await logIx(bid,pid,td(),note,'');
  if(pog>=5){await setPSt(bid,pid,'Done - later opvolgen');toast(`${c.naam} / ${p.naam} → 5 pogingen → Done`)}
  else toast(`Poging ${pog} gelogd`);
}

async function logIx(bid,pid,datum,note,herinnering){
  try{await shApp('Interacties!A:E',[[bid,pid,datum,note,herinnering||'']])}catch(e){console.warn('Log fout:',e)}
  const c=getC(bid),p=getP(c,pid);
  if(p){
    p.interacties.push({datum,note,herinnering:herinnering||''});
    p.laatste_contact=datum.slice(0,10);
  }
  if(c){
    const lcs=c.personen.map(ps=>ps.laatste_contact).filter(Boolean);
    c.laatste_contact=lcs.length?Math.max(...lcs.map(d=>new Date(d).getTime()),(new Date(datum)).getTime())&&datum.slice(0,10):datum.slice(0,10);
    c.totaal_ix=c.personen.reduce((s,ps)=>s+ps.interacties.length,0);
  }
  updRow(bid);rDash();
  if(selId===bid)rDet(bid);
}

function updRow(bid){
  const el=document.getElementById('row-'+bid),c=getC(bid);
  if(el&&c)el.outerHTML=browH(c);
}

async function setAbcd(bid,abcd){
  const c=getC(bid);if(!c)return;
  c.abcd=abcd;
  try{
    const d=await shGet('Contacten!A:A');
    // Update alle personen van dit bedrijf
    for(const p of c.personen){
      const ri=(d.values||[]).findIndex(r=>r[0]===p.id);
      if(ri>0)await shPut(`Contacten!K${ri+1}`,[[abcd]]);
    }
  }catch(e){console.warn('ABCD fout:',e)}
  updRow(bid);rDash();

async function setBedrijfSt(bid,status){

  c.status=status;
  // Zet ook alle personen op deze status
  c.personen.forEach(p=>p.status=status);
  try{
    const d=await shGet('Contacten!A:A');
    for(const p of c.personen){
      const ri=(d.values||[]).findIndex(r=>r[0]===p.id);
      if(ri>0)await shPut(`Contacten!H${ri+1}`,[[status]]);
    }
  }catch(e){console.warn('Status fout:',e)}
  updRow(bid);rDash();
  if(selId===bid)rDet(bid);
}

async function setPSt(bid,pid,status){
  const c=getC(bid),p=getP(c,pid);if(!c||!p)return;
  p.status=status;
  // Update bedrijfsstatus naar beste
  const sRank={'Opvolgen':0,'In afwachting':1,'Done - later opvolgen':2,'Nieuw':3,'Afsluiten':4};
  c.status=c.personen.reduce((best,ps)=>sRank[ps.status]<sRank[best]?ps.status:best,c.personen[0]?.status||'Nieuw');
  try{
    const d=await shGet('Contacten!A:A');
    const ri=(d.values||[]).findIndex(r=>r[0]===pid);
    if(ri>0)await shPut(`Contacten!H${ri+1}`,[[status]]);
  }catch(e){console.warn('PStatus fout:',e)}
  if(status==='Done - later opvolgen')await logIx(bid,pid,td(),'Status → Done — herinnering 6 weken',ad(42));
  updRow(bid);rDash();
  if(selId===bid)rDet(bid);
}

async function modalOk(){
  document.getElementById('mok').disabled=true;
  try{
    if(mMode==='terugbel'){
      const datum=document.getElementById('tbd').value,tijd=document.getElementById('tbt').value;
      const note=document.getElementById('tbn').value||'Terugbelafspraak';
      await logIx(mBid,mPid,`${datum}T${tijd}`,note,datum);
      toast(`Terugbel: ${datum} ${tijd}`);closeM();
    }else if(mMode==='gesproken'||mMode==='email'){
      const note=(document.getElementById('mnote')?.value||'').trim();
      const nf=document.getElementById('mfg')?.dataset?.sel;
      const p=mPid&&getC(mBid)?getP(getC(mBid),mPid):null;
      if(note)await logIx(mBid,mPid,td(),note,'');
      if(nf&&nf!==p?.status)await setPSt(mBid,mPid,nf);
      toast('Opgeslagen');closeM();
    }else if(mMode==='nieuw'){
      await addBedrijf();return;
    }else if(mMode==='persoon'){
      await addPersoon(mBid);return;
    }
  }catch(e){toast('Fout: '+e.message)}
  document.getElementById('mok').disabled=false;
}

function setActF(f){afF=f;document.querySelectorAll('.pt').forEach(el=>el.classList.toggle('on',el.id==='pt-'+f));renderAc()}
function renderAc(){
  const t=td(),wk=ad(7),mn=ad(30);
  let L=AC.filter(a=>{
    if(afF==='g')return a.gedaan;if(a.gedaan)return false;
    if(afF==='v')return a.deadline===t;
    if(afF==='w')return!a.deadline||a.deadline<=wk;
    if(afF==='m')return!a.deadline||a.deadline<=mn;
    if(afF==='e')return a.deadline&&a.deadline<t;
    return true;
  }).sort((a,b)=>(+a.gedaan-+b.gedaan)||(a.deadline||'9999').localeCompare(b.deadline||'9999'));
  if(!L.length){document.getElementById('al').innerHTML='<div class="lm" style="text-align:left">geen acties</div>';return}
  document.getElementById('al').innerHTML=L.map(a=>{
    const c=getC(a.bedrijf_id),p=a.persoon_id&&c?getP(c,a.persoon_id):null;
    const tn=td();let dlH=a.deadline?`<span class="dl ${a.deadline<tn?'oud':a.deadline===tn?'vd':'ok'}">${a.deadline}</span>`:'';
    return`<div class="ac${a.gedaan?' x':''}">
      <div class="chk${a.gedaan?' on':''}" onclick="togA('${a.id}','${a.bedrijf_id}')">${a.gedaan?'✓':''}</div>
      <div style="flex:1;min-width:0">
        <div class="at${a.gedaan?' x':''}">${esc(a.omschrijving)}</div>
        <div style="display:flex;gap:6px;align-items:center;margin-top:4px;flex-wrap:wrap">
          ${c?`<span class="cl" onclick="setTab('c');sel('${c.id}')">${esc(c.naam)}</span>`:''}
          ${p?`<span style="font-size:9px;color:var(--t3)">${esc(p.naam)}</span>`:''}
          ${dlH}
        </div>
      </div>
    </div>`;
  }).join('');
}

async function bulkAssign(){
  const soort=document.getElementById('bulk-soort').value;if(!soort){toast('Kies eerst een soort');return}
  const sel=Array.from(document.querySelectorAll('.kchk:checked')).map(el=>el.dataset.id);
  if(!sel.length){toast('Selecteer minstens één bedrijf');return}
  const ss=document.getElementById('bulk-status');ss.textContent=`Bezig...`;ss.style.color='var(--yel)';
  let ok=0;
  for(const bid of sel){

    try{
      const d=await shGet('Contacten!A:A');
      for(const p of c.personen){

        if(ri>0)await shPut(`Contacten!D${ri+1}`,[[soort]]);
      }
      ok++;
    }catch(e){console.warn(e)}

}

  COMPANIES.forEach(c=>abcdCount[c.abcd]=(abcdCount[c.abcd]||0)+1);
  // ABCD bar
  document.getElementById('dpb').innerHTML=['A','B','C','D'].map(k=>`<div class="ps" style="width:${(abcdCount[k]/tot*100).toFixed(1)}%;background:${ACH[k]}" title="${k}: ${abcdCount[k]}"></div>`).join('');
  document.getElementById('dabcd').innerHTML=['A','B','C','D'].map(k=>`
    <div class="fbr" onclick="setAF(document.querySelector('[data-a=\\'${k}\\']'))">
      <div class="fbl" style="color:${ACH[k]}">${k}</div>
      <div class="fbt"><div class="fbf" style="width:${Math.round(abcdCount[k]/tot*100)}%;background:${ACH[k]}"></div></div>
      <div class="fbn">${abcdCount[k]}</div>
    </div>`).join('');
  // Fase bars
  const faseCount={};FASES.forEach(f=>faseCount[f]=COMPANIES.filter(c=>c.status===f).length);

      <div class="fbt"><div class="fbf" style="width:${Math.round(faseCount[f]/tot*100)}%;background:${FH[f]}"></div></div>
      <div class="fbn">${faseCount[f]}</div>
    </div>`).join('');
  // Stats
  const actief=COMPANIES.filter(c=>c.status==='Opvolgen'||c.status==='In afwachting').length;
  const openAc=AC.filter(a=>!a.gedaan).length;
  const wkIx=COMPANIES.flatMap(c=>c.personen.flatMap(p=>p.interacties)).filter(i=>i.datum&&i.datum>=wk7).length;
  document.getElementById('dst').innerHTML=[
    {n:COMPANIES.length,l:'bedrijven',col:'var(--t)'},
    {n:actief,l:'actief',col:'var(--blu)'},
    {n:openAc,l:'open acties',col:'var(--yel)'},
    {n:wkIx,l:'contactm./week',col:'var(--acc)'},
  ].map(s=>`<div class="st"><div class="sn" style="color:${s.col}">${s.n}</div><div class="sl2">${s.l}</div></div>`).join('');
  // Vandaag
  const tb=COMPANIES.filter(c=>c.personen.some(p=>p.interacties.some(i=>i.datum&&i.datum.startsWith(t)&&/terugbel/i.test(i.note||''))));
  const op=COMPANIES.filter(c=>(c.status==='Opvolgen'||c.status==='In afwachting')&&!tb.find(x=>x.id===c.id))
    .sort((a,b)=>(a.laatste_contact||'').localeCompare(b.laatste_contact||'')).slice(0,6);
  const dItems=[
    ...tb.map(c=>`<div class="di" onclick="sel('${c.id}')"><div class="dtijd">📅</div><div><div class="dnam">${esc(c.naam)}</div><div class="dsub">terugbel vandaag</div></div></div>`),
    ...op.map(c=>`<div class="di" onclick="sel('${c.id}')"><div class="dtijd" style="color:${lcC(c.laatste_contact)}">${lcL(c.laatste_contact)}</div><div><div class="dnam">${esc(c.naam)}</div><div class="dsub">${esc(c.soort||c.status)}</div></div></div>`)
  ];
  document.getElementById('dvd').innerHTML=dItems.length?dItems.join(''):'<div class="em">niets gepland 🎉</div>';
  // Aandacht: A/B contacten die lang niet benaderd
  const att=COMPANIES.filter(c=>(c.abcd==='A'||c.abcd==='B')&&(c.status==='Opvolgen')&&(ds(c.laatste_contact)||0)>14)
    .sort((a,b)=>(ds(b.laatste_contact)||0)-(ds(a.laatste_contact)||0)).slice(0,5);
  document.getElementById('dan').innerHTML=att.length
    ?att.map(c=>`<div class="di" onclick="sel('${c.id}')"><div class="dtijd" style="color:var(--red)">${lcL(c.laatste_contact)}</div><div><div class="dnam">${esc(c.naam)}</div><div class="dsub">${c.abcd} · ${esc(c.soort||'')}</div></div></div>`).join('')
    :'<div class="em">alles op tijd 👍</div>';
  // Activiteit
  const mnIx=COMPANIES.flatMap(c=>c.personen.flatMap(p=>p.interacties)).filter(i=>i.datum&&i.datum>=mn30).length;
  document.getElementById('dact').innerHTML=[
    {n:wkIx,l:'deze week',col:'var(--acc)'},
    {n:mnIx,l:'deze maand',col:'var(--t2)'},
  ].map(s=>`<div class="st"><div class="sn" style="color:${s.col}">${s.n}</div><div class="sl2">${s.l}</div></div>`).join('');
}

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3000)}

// ── GOOGLE CONTACTEN KOPPELING ────────────────────────────────────────────
const GOOG_CLIENT_ID = '131419546011-sh94vpgvv0qc4i5jjpbr5gv0h1o2163g.apps.googleusercontent.com';
const GOOG_SCOPE     = 'https://www.googleapis.com/auth/contacts.readonly';
let gToken = null, gTokenExp = 0;

// Laad de Google Identity Services library dynamisch
function loadGIS(){
  return new Promise((res,rej)=>{
    if(window.google?.accounts?.oauth2){res();return}
    const s=document.createElement('script');
    s.src='https://accounts.google.com/gsi/client';
    s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}

async function getGToken(){
  if(gToken && Date.now()<gTokenExp-60000) return gToken;
  await loadGIS();
  return new Promise((res,rej)=>{
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GOOG_CLIENT_ID,
      scope:     GOOG_SCOPE,
      callback:  r=>{
        if(r.error){rej(new Error(r.error_description||r.error));return}
        gToken    = r.access_token;
        gTokenExp = Date.now() + (r.expires_in||3600)*1000;
        res(gToken);
      },
      error_callback: e=>{rej(new Error(e.message||e.type||'Auth fout'))}
    });
    // prompt:'' hergebruikt bestaand token zonder popup als mogelijk
    client.requestAccessToken({prompt:''});
  });
}

// Haal alle contacten op (gepagineerd)
async function fetchAllContacts(){
  const t = await getGToken();
  let contacts=[], pageToken=null;
  do {
    const url = 'https://people.googleapis.com/v1/people/me/connections'
      + '?personFields=names,emailAddresses,phoneNumbers,organizations,urls,photos'
      + '&pageSize=1000'
      + (pageToken?'&pageToken='+pageToken:'');
    const r = await fetch(url, {headers:{Authorization:'Bearer '+t}});
    const d = await r.json();
    if(d.error) throw new Error(d.error.message);
    (d.connections||[]).forEach(p=>contacts.push(p));
    pageToken = d.nextPageToken||null;
  } while(pageToken);
  return contacts;
}

// Normaliseer naam voor matching
function normNaam(s){
  return (s||'').toLowerCase().trim()
    .replace(/[bv]\.v\.|b\.v\.|nv|n\.v\./g,'')
    .replace(/[^a-z0-9 ]/g,' ')
    .replace(/\s+/g,' ').trim();
}

// Match Google contact aan CRM bedrijf/persoon
function matchContact(gc, companies){
  const gcNamen = (gc.names||[]).map(n=>normNaam(n.displayName||''));
  const gcOrgs  = (gc.organizations||[]).map(o=>normNaam(o.name||''));

  for(const c of companies){
    const cNorm = normNaam(c.naam||'');
    // Match op bedrijfsnaam
    if(cNorm && (gcOrgs.some(o=>o&&(o.includes(cNorm)||cNorm.includes(o))))) {
      // Zoek juiste persoon binnen bedrijf
      for(const p of c.personen){
        const pNorm = normNaam(p.naam||'');
        if(pNorm && gcNamen.some(n=>n&&(n.includes(pNorm)||pNorm.includes(n)))){
          return {bedrijf:c, persoon:p};
        }
      }
      // Geen persoon gevonden maar bedrijf matched — return eerste persoon
      return {bedrijf:c, persoon:null};
    }
    // Match op persoonsnaam direct
    for(const p of c.personen){
      const pNorm = normNaam(p.naam||'');
      if(pNorm && gcNamen.some(n=>n&&n.length>3&&(n.includes(pNorm)||pNorm.includes(n)))){
        return {bedrijf:c, persoon:p};
      }
    }
  }
  return null;
}

// Verrijk CRM met Google Contacten data
async function verrijkMetContacten(){
  const btn = document.getElementById('sync-gc-btn');
  const lbl = document.getElementById('sync-gc-lbl');
  btn.disabled=true; lbl.textContent='Inloggen...'; lbl.style.color='var(--yel)';

  try{
    lbl.textContent='Contacten laden...';
    const gcList = await fetchAllContacts();
    lbl.textContent=`${gcList.length} contacten gevonden, matchen...`;

    let aangevuld=0, gematch=0;

    for(const gc of gcList){
      const match = matchContact(gc, COMPANIES);
      if(!match) continue;
      gematch++;

      const {bedrijf:c, persoon:p} = match;

      // Verrijk persoon als gevonden
      if(p){
        let changed=false;
        // Email
        if(!p.email){
          const e=(gc.emailAddresses||[])[0]?.value;
          if(e){p.email=e;changed=true}
        }
        // Telefoon
        if(!p.tel){
          const t=(gc.phoneNumbers||[])[0]?.value;
          if(t){p.tel=t;changed=true}
        }
        // LinkedIn/URL
        if(!p.link){
          const u=(gc.urls||[]).find(u=>/linkedin/i.test(u.value||''))?.value
            || (gc.urls||[])[0]?.value;
          if(u){p.link=u;changed=true}
        }
        // Foto
        if(!p.foto){
          const f=(gc.photos||[]).find(ph=>!ph.default)?.url;
          if(f){p.foto=f;changed=true}
        }
        if(changed) aangevuld++;
      }

      // Verrijk bedrijf: soort uit organisatie als leeg
      if(!c.soort){
        const org=(gc.organizations||[])[0];
        if(org?.type) c.soort=org.type;
      }
    }

    lbl.textContent=`✓ ${gematch} matches, ${aangevuld} aangevuld`;
    lbl.style.color='var(--acc)';
    // Herrender lijst en huidig detail
    rl(); rDash();
    if(selId) rDet(selId);
    toast(`Google Contacten: ${aangevuld} personen aangevuld`);
  }catch(e){
    lbl.textContent='✗ '+e.message;
    lbl.style.color='var(--red)';
    console.error('Google Contacten fout:',e);
  }
  btn.disabled=false;
}
